name: Daily Financial Scan

on:
  schedule:
    # ירוץ כל יום בשעה 05:45 UTC (שהם 07:45 שעון ישראל בחורף / 08:45 בקיץ)
    - cron: '45 5 * * *'
  workflow_dispatch: # מאפשר להריץ גם ידנית בלחיצת כפתור

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generator.py


    - name: Commit and Push index.html
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
        if [ -f index.html ]; then
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Auto-update financial news"
          git push
        else
          echo "index.html not found"
          exit 1
        fi

   
